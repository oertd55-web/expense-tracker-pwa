<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>บันทึกค่าใช้จ่าย</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>บันทึกค่าใช้จ่าย</h1>
</header>

<main>
  <section class="card" id="sheet-card">
    <h2>ค่าใช้จ่ายหลัก</h2>
    <div class="sheet-row">
      <select id="sheet-select"></select>
      <button id="new-sheet-btn" class="btn-secondary" title="สร้างใหม่">+ ใหม่</button>
    </div>
    <div class="sheet-row">
      <button id="rename-sheet-btn" class="btn-secondary">เปลี่ยนชื่อ</button>
      <button id="delete-sheet-btn" class="btn-danger">ลบรายการหลักนี้</button>
    </div>
  </section>

  <section class="card" id="form-card">
    <h2 id="form-title">เพิ่มรายการ</h2>
    <form id="expense-form">
      <label>ชื่อรายการ
        <input type="text" id="name" required placeholder="เช่น ค่าน้ำมัน">
      </label>
      <label>ยอด (บาท)
        <input type="number" id="amount" required step="0.01" min="0" placeholder="0.00">
      </label>
      <label>วันที่
        <input type="date" id="date" required>
      </label>
      <label>เอกสารแนบ (รูป/ไฟล์)
        <input type="file" id="attachment" accept="image/*,application/pdf" capture="environment">
      </label>
      <div id="preview-wrap"></div>
      <button type="submit" id="submit-btn" class="btn-primary">บันทึกรายการ</button>
      <button type="button" id="cancel-edit-btn" class="btn-secondary hidden">ยกเลิกการแก้ไข</button>
    </form>
  </section>

  <section class="card">
    <div class="row-between">
      <h2>สรุปยอดรวม</h2>
      <strong id="total-amount">0.00 บาท</strong>
    </div>
    <div class="row-between">
      <button id="export-btn" class="btn-secondary">ดาวน์โหลดรายงาน (CSV)</button>
      <button id="export-pdf-btn" class="btn-secondary">ดาวน์โหลดรายงาน (PDF)</button>
    </div>
    <div class="row-between">
      <button id="clear-btn" class="btn-danger">ล้างข้อมูลทั้งหมด</button>
    </div>
  </section>

  <section class="card">
    <h2>รายการทั้งหมด</h2>
    <div id="list"></div>
    <button id="add-next-btn" class="btn-add-next">+ เพิ่มรายการถัดไป</button>
  </section>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button id="modal-close" class="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<div id="print-report"></div>

<script src="app.js"></script>
</body>
</html>
